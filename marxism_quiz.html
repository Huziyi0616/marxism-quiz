<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#b33a3a">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <title>马原选择题记忆练习</title>
  <style>
    :root {
      --ink: #1d232b;
      --muted: #667085;
      --line: #d8dee8;
      --paper: #f7f5ef;
      --surface: #ffffff;
      --soft: #eef4f1;
      --accent: #b33a3a;
      --accent-dark: #8f2929;
      --green: #2f7d58;
      --amber: #9a6a12;
      --blue: #2f5f98;
      --shadow: 0 18px 45px rgba(27, 37, 51, 0.12);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(179, 58, 58, 0.08), transparent 35%),
        linear-gradient(315deg, rgba(47, 95, 152, 0.10), transparent 42%),
        var(--paper);
    }

    button, input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 32px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 18px 0 20px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3.2vw, 42px);
      letter-spacing: 0;
      line-height: 1.1;
    }

    .subtitle {
      margin: 8px 0 0;
      max-width: 720px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
    }

    .mini-visual {
      width: 184px;
      height: 112px;
      border-radius: 8px;
      background:
        linear-gradient(120deg, rgba(179, 58, 58, .94), rgba(143, 41, 41, .86)),
        radial-gradient(circle at 72% 24%, rgba(255, 255, 255, .7), transparent 28%);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .mini-visual::before,
    .mini-visual::after {
      content: "";
      position: absolute;
      background: rgba(255, 255, 255, .92);
      border-radius: 5px;
      transform: rotate(-7deg);
    }

    .mini-visual::before {
      width: 108px;
      height: 70px;
      left: 22px;
      top: 26px;
      box-shadow: 0 9px 0 rgba(255, 255, 255, .38);
    }

    .mini-visual::after {
      width: 64px;
      height: 8px;
      left: 44px;
      top: 48px;
      box-shadow: 0 17px 0 rgba(29, 35, 43, .18), 0 34px 0 rgba(29, 35, 43, .12);
      background: rgba(29, 35, 43, .28);
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin: 4px 0 20px;
    }

    .tool-button,
    .mode-button,
    .option-button,
    .text-button {
      min-height: 42px;
      border-radius: 8px;
      padding: 10px 14px;
      transition: transform .15s ease, background .15s ease, border-color .15s ease;
    }

    .mode-button,
    .tool-button,
    .text-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .74);
      color: var(--ink);
    }

    .mode-button.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .tool-button:hover,
    .mode-button:hover,
    .text-button:hover,
    .option-button:hover {
      transform: translateY(-1px);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 18px;
      align-items: start;
    }

    .quiz-panel,
    .side-panel {
      background: rgba(255, 255, 255, .88);
      border: 1px solid rgba(216, 222, 232, .9);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .quiz-panel {
      min-height: 560px;
      padding: 22px;
    }

    .side-panel {
      padding: 18px;
    }

    .question-meta {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 16px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--soft);
      color: #285944;
      font-size: 13px;
      white-space: nowrap;
    }

    .progress-track {
      height: 8px;
      background: #e6e9ef;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 22px;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--blue));
      transition: width .2s ease;
    }

    .question {
      margin: 0 0 18px;
      font-size: clamp(21px, 2.6vw, 30px);
      line-height: 1.45;
      letter-spacing: 0;
    }

    .options {
      display: grid;
      gap: 12px;
      margin: 18px 0;
    }

    .option-button {
      width: 100%;
      display: grid;
      grid-template-columns: 36px 1fr;
      gap: 10px;
      align-items: center;
      text-align: left;
      color: var(--ink);
      background: #fbfcff;
      border: 1px solid var(--line);
      line-height: 1.55;
    }

    .option-letter {
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      color: var(--blue);
      background: #e8eef7;
      font-weight: 700;
      flex: 0 0 auto;
    }

    .option-button.correct {
      border-color: rgba(47, 125, 88, .58);
      background: #edf7f1;
    }

    .option-button.correct .option-letter {
      background: var(--green);
      color: white;
    }

    .option-button.wrong {
      border-color: rgba(179, 58, 58, .58);
      background: #fff0f0;
    }

    .option-button.wrong .option-letter {
      background: var(--accent);
      color: white;
    }

    .option-button:disabled {
      cursor: default;
      transform: none;
    }

    .feedback {
      display: none;
      margin-top: 18px;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fffaf0;
      line-height: 1.7;
    }

    .feedback.show {
      display: block;
    }

    .feedback strong {
      color: var(--accent-dark);
    }

    .quiz-actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .primary:hover {
      background: var(--accent-dark);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 10px;
    }

    .stat b {
      display: block;
      font-size: 22px;
      line-height: 1;
      margin-bottom: 7px;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .side-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin: 0 0 12px;
      font-size: 18px;
    }

    .search {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 11px;
      color: var(--ink);
      background: #fff;
      margin-bottom: 12px;
    }

    .point-list {
      display: grid;
      gap: 10px;
      max-height: 460px;
      overflow: auto;
      padding-right: 2px;
    }

    .point-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
    }

    .point-item button {
      width: 100%;
      text-align: left;
      padding: 0;
      background: transparent;
      color: var(--ink);
      line-height: 1.55;
    }

    .point-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .danger {
      color: var(--accent-dark);
    }

    .success {
      color: var(--green);
    }

    .empty {
      color: var(--muted);
      line-height: 1.7;
      padding: 12px 0;
    }

    .icon {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @media (max-width: 900px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .mini-visual {
        display: none;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .side-panel {
        order: -1;
      }
    }

    @media (max-width: 560px) {
      .app {
        width: min(100% - 20px, 1180px);
        padding-top: 12px;
      }

      .quiz-panel,
      .side-panel {
        padding: 14px;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr;
      }

      .mode-button,
      .tool-button,
      .text-button {
        justify-content: center;
      }

      .option-button {
        grid-template-columns: 32px 1fr;
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>马原选择题记忆练习</h1>
        <p class="subtitle">根据你的复习大纲整理为 26 个核心考点，每个考点会随机变换材料、题干和干扰项。答错会自动记录到常错知识点，刷新页面后记录仍会保留。</p>
      </div>
      <div class="mini-visual" aria-hidden="true"></div>
    </header>

    <section class="controls" aria-label="练习模式">
      <button id="randomMode" class="mode-button active" type="button">
        <svg class="icon" viewBox="0 0 24 24"><path d="M16 3h5v5"></path><path d="M4 20 21 3"></path><path d="M21 16v5h-5"></path><path d="M15 15l6 6"></path><path d="M4 4l5 5"></path></svg>
        随机练习
      </button>
      <button id="orderMode" class="mode-button" type="button">
        <svg class="icon" viewBox="0 0 24 24"><path d="M8 6h13"></path><path d="M8 12h13"></path><path d="M8 18h13"></path><path d="M3 6h.01"></path><path d="M3 12h.01"></path><path d="M3 18h.01"></path></svg>
        顺序练习
      </button>
      <button id="wrongMode" class="mode-button" type="button">
        <svg class="icon" viewBox="0 0 24 24"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><path d="M12 9v4"></path><path d="M12 17h.01"></path></svg>
        错题强化
      </button>
      <button id="resetStats" class="tool-button" type="button">
        <svg class="icon" viewBox="0 0 24 24"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path></svg>
        清空记录
      </button>
    </section>

    <section class="layout">
      <article class="quiz-panel" aria-live="polite">
        <div class="question-meta">
          <span id="counter">第 1 / 25 题</span>
          <span id="tag" class="tag">马克思主义总论</span>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <h2 id="questionText" class="question"></h2>
        <div id="options" class="options"></div>
        <div id="feedback" class="feedback"></div>
        <div class="quiz-actions">
          <button id="nextQuestion" class="text-button primary" type="button">
            <svg class="icon" viewBox="0 0 24 24"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
            下一题
          </button>
          <button id="showAnswer" class="text-button" type="button">
            <svg class="icon" viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            查看答案
          </button>
        </div>
      </article>

      <aside class="side-panel">
        <div class="stats-grid">
          <div class="stat"><b id="doneCount">0</b><span>已答题</span></div>
          <div class="stat"><b id="accuracy">0%</b><span>正确率</span></div>
          <div class="stat"><b id="wrongCount">0</b><span>错题数</span></div>
        </div>

        <h3 class="side-title">常错知识点</h3>
        <input id="searchInput" class="search" type="search" placeholder="搜索考点或关键词">
        <div id="pointList" class="point-list"></div>
      </aside>
    </section>
  </main>

  <script>
    const questions = [
      {
        id: "q01",
        category: "马克思主义总论",
        point: "唯物史观和剩余价值学说是马克思一生的两个伟大发现。",
        question: "马克思一生的两个伟大发现是下列哪一组？",
        options: ["唯物史观和剩余价值学说", "辩证法和形而上学批判", "劳动价值论和国家学说", "实践观和人民史观"],
        answer: 0,

        options: ["共性与个性的关系", "原因与结果的关系", "本质与现象完全等同的关系", "整体与部分完全割裂的关系"],

      {

    const storageKey = "marxism-quiz-v1";
    const letters = ["A", "B", "C", "D"];
    let stats = loadStats();
    let mode = "random";
    let queue = [];
    let currentIndex = 0;
    let answered = false;
    let currentQuestion = null;
    let currentView = null;

    const el = {
      counter: document.getElementById("counter"),
      tag: document.getElementById("tag"),
      progressBar: document.getElementById("progressBar"),
      questionText: document.getElementById("questionText"),
      options: document.getElementById("options"),
      feedback: document.getElementById("feedback"),
      next: document.getElementById("nextQuestion"),
      showAnswer: document.getElementById("showAnswer"),
      randomMode: document.getElementById("randomMode"),
      orderMode: document.getElementById("orderMode"),
      wrongMode: document.getElementById("wrongMode"),
      resetStats: document.getElementById("resetStats"),
      doneCount: document.getElementById("doneCount"),
      accuracy: document.getElementById("accuracy"),
      wrongCount: document.getElementById("wrongCount"),
      pointList: document.getElementById("pointList"),
      searchInput: document.getElementById("searchInput")
    };

    function loadStats() {
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey));
        if (saved && typeof saved === "object") return saved;
      } catch (error) {}
      return {};
    }

    function saveStats() {
      localStorage.setItem(storageKey, JSON.stringify(stats));
    }

    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function buildQueue(nextMode = mode) {
      if (nextMode === "wrong") {
        const wrong = questions.filter(q => (stats[q.id]?.wrong || 0) > 0);
        return wrong.length ? shuffle(wrong) : [];
      }
      if (nextMode === "order") return [...questions];
      return shuffle(questions);
    }

    function setMode(nextMode) {
      mode = nextMode;
      currentIndex = 0;
      queue = buildQueue(mode);
      updateModeButtons();
      renderQuestion();
      renderStats();
    }

    function updateModeButtons() {
      el.randomMode.classList.toggle("active", mode === "random");
      el.orderMode.classList.toggle("active", mode === "order");
      el.wrongMode.classList.toggle("active", mode === "wrong");
    }

    function renderQuestion() {
      answered = false;
      el.feedback.className = "feedback";
      el.feedback.innerHTML = "";

      if (!queue.length) {
        currentQuestion = null;
        el.counter.textContent = "暂无错题";
        el.tag.textContent = "错题强化";
        el.progressBar.style.width = "0%";
        el.questionText.textContent = "现在还没有常错知识点。先去随机或顺序练习答几题，再回来强化。";
        el.options.innerHTML = "";
        el.showAnswer.disabled = true;
        el.next.disabled = true;
        return;
      }

      if (currentIndex >= queue.length) {
        if (mode === "random") queue = shuffle(queue);
        currentIndex = 0;
      }

      currentQuestion = queue[currentIndex];
      currentView = buildQuestionView(currentQuestion);
      el.counter.textContent = `第 ${currentIndex + 1} / ${queue.length} 题`;
      el.tag.textContent = currentQuestion.category;
      el.progressBar.style.width = `${((currentIndex + 1) / queue.length) * 100}%`;
      el.questionText.textContent = currentView.question;
      el.showAnswer.disabled = false;
      el.next.disabled = false;

      el.options.innerHTML = currentView.options.map((option, index) => `
        <button class="option-button" type="button" data-index="${index}">
          <span class="option-letter">${letters[index]}</span>
          <span>${option}</span>
        </button>
      `).join("");

      [...el.options.querySelectorAll("button")].forEach(button => {
        button.addEventListener("click", () => choose(Number(button.dataset.index)));
      });
    }

    function buildQuestionView(question) {
      const textOnlyForms = [question.question, ...(variantBank[question.id] || [])].map(prompt => ({
        question: prompt,
        options: question.options,
        answer: question.answer,
        explanation: question.explanation
      }));
      const forms = [...textOnlyForms, ...(formBank[question.id] || [])];
      const form = forms[Math.floor(Math.random() * forms.length)];
      const options = form.options.map((text, index) => ({
        text,
        originalIndex: index
      }));
      const shuffled = shuffle(options);
      return {
        question: form.question,
        options: shuffled.map(option => option.text),
        answer: shuffled.findIndex(option => option.originalIndex === form.answer),
        explanation: form.explanation || question.explanation
      };
    }

    function choose(index, revealOnly = false) {
      if (!currentQuestion || !currentView || answered) return;
      answered = true;
      const isCorrect = index === currentView.answer;

      if (!revealOnly) {
        const record = stats[currentQuestion.id] || { attempts: 0, correct: 0, wrong: 0 };
        record.attempts += 1;
        if (isCorrect) {
          record.correct += 1;
          record.last = "correct";
        } else {
          record.wrong += 1;
          record.last = "wrong";
          record.lastWrongAt = new Date().toISOString();
        }
        stats[currentQuestion.id] = record;
        saveStats();
      }

      [...el.options.querySelectorAll("button")].forEach(button => {
        const buttonIndex = Number(button.dataset.index);
        button.disabled = true;
        if (buttonIndex === currentView.answer) button.classList.add("correct");
        if (!revealOnly && buttonIndex === index && !isCorrect) button.classList.add("wrong");
      });

      const status = revealOnly ? "答案" : (isCorrect ? "答对了" : "答错了");
      const correctText = currentView.options[currentView.answer];
      el.feedback.className = "feedback show";
      el.feedback.innerHTML = `
        <strong>${status}：${letters[currentView.answer]}. ${correctText}</strong>
        <div>${currentView.explanation}</div>
        <div>考点：${currentQuestion.point}</div>
      `;
      renderStats();
    }

    function nextQuestion() {
      if (!queue.length) return;
      currentIndex += 1;
      renderQuestion();
    }

    function revealAnswer() {
      if (!currentQuestion || answered) return;
      choose(currentView.answer, true);
    }

    function renderStats() {
      const records = Object.values(stats);
      const attempts = records.reduce((sum, item) => sum + (item.attempts || 0), 0);
      const correct = records.reduce((sum, item) => sum + (item.correct || 0), 0);
      const wrongQuestions = questions.filter(q => (stats[q.id]?.wrong || 0) > 0).length;
      el.doneCount.textContent = attempts;
      el.accuracy.textContent = attempts ? `${Math.round((correct / attempts) * 100)}%` : "0%";
      el.wrongCount.textContent = wrongQuestions;
      renderPointList();
    }

    function renderPointList() {
      const keyword = el.searchInput.value.trim().toLowerCase();
      const decorated = questions
        .map(q => ({ ...q, stat: stats[q.id] || { attempts: 0, correct: 0, wrong: 0 } }))
        .filter(q => {
          if (!keyword) return true;
          return `${q.category} ${q.point} ${q.question}`.toLowerCase().includes(keyword);
        })
        .sort((a, b) => {
          const wrongDiff = (b.stat.wrong || 0) - (a.stat.wrong || 0);
          if (wrongDiff) return wrongDiff;
          return (b.stat.attempts || 0) - (a.stat.attempts || 0);
        });

      if (!decorated.length) {
        el.pointList.innerHTML = `<div class="empty">没有匹配的考点。</div>`;
        return;
      }

      el.pointList.innerHTML = decorated.map(q => {
        const attempts = q.stat.attempts || 0;
        const wrong = q.stat.wrong || 0;
        const correct = q.stat.correct || 0;
        const accuracy = attempts ? Math.round((correct / attempts) * 100) : 0;
        const statusClass = wrong ? "danger" : (attempts ? "success" : "");
        const status = wrong ? `错 ${wrong} 次` : (attempts ? "暂未答错" : "未练习");
        return `
          <div class="point-item">
            <button type="button" data-jump="${q.id}">
              <strong>${q.category}</strong><br>${q.point}
            </button>
            <div class="point-row">
              <span class="${statusClass}">${status}</span>
              <span>${attempts ? `正确率 ${accuracy}%` : "点击可练此题"}</span>
            </div>
          </div>
        `;
      }).join("");

      [...el.pointList.querySelectorAll("button[data-jump]")].forEach(button => {
        button.addEventListener("click", () => jumpToQuestion(button.dataset.jump));
      });
    }

    function jumpToQuestion(id) {
      const found = questions.find(q => q.id === id);
      if (!found) return;
      mode = "order";
      queue = [found, ...questions.filter(q => q.id !== id)];
      currentIndex = 0;
      updateModeButtons();
      renderQuestion();
    }

    function resetStats() {
      const ok = window.confirm("确定清空答题记录和常错知识点吗？");
      if (!ok) return;
      stats = {};
      saveStats();
      if (mode === "wrong") queue = buildQueue("wrong");
      renderQuestion();
      renderStats();
    }

    el.randomMode.addEventListener("click", () => setMode("random"));
    el.orderMode.addEventListener("click", () => setMode("order"));
    el.wrongMode.addEventListener("click", () => setMode("wrong"));
    el.resetStats.addEventListener("click", resetStats);
    el.next.addEventListener("click", nextQuestion);
    el.showAnswer.addEventListener("click", revealAnswer);
    el.searchInput.addEventListener("input", renderPointList);

    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }

    queue = buildQueue(mode);
    renderQuestion();
    renderStats();
  </script>
