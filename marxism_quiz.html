<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#b33a3a">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <title>马原选择题记忆练习</title>
  <style>
    :root {
      --ink: #1d232b;
      --muted: #667085;
      --line: #d8dee8;
      --paper: #f7f5ef;
      --surface: #ffffff;
      --soft: #eef4f1;
      --accent: #b33a3a;
      --accent-dark: #8f2929;
      --green: #2f7d58;
      --amber: #9a6a12;
      --blue: #2f5f98;
      --shadow: 0 18px 45px rgba(27, 37, 51, 0.12);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(179, 58, 58, 0.08), transparent 35%),
        linear-gradient(315deg, rgba(47, 95, 152, 0.10), transparent 42%),
        var(--paper);
    }

    button, input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 32px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 18px 0 20px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3.2vw, 42px);
      letter-spacing: 0;
      line-height: 1.1;
    }

    .subtitle {
      margin: 8px 0 0;
      max-width: 720px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
    }

    .mini-visual {
      width: 184px;
      height: 112px;
      border-radius: 8px;
      background:
        linear-gradient(120deg, rgba(179, 58, 58, .94), rgba(143, 41, 41, .86)),
        radial-gradient(circle at 72% 24%, rgba(255, 255, 255, .7), transparent 28%);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .mini-visual::before,
    .mini-visual::after {
      content: "";
      position: absolute;
      background: rgba(255, 255, 255, .92);
      border-radius: 5px;
      transform: rotate(-7deg);
    }

    .mini-visual::before {
      width: 108px;
      height: 70px;
      left: 22px;
      top: 26px;
      box-shadow: 0 9px 0 rgba(255, 255, 255, .38);
    }

    .mini-visual::after {
      width: 64px;
      height: 8px;
      left: 44px;
      top: 48px;
      box-shadow: 0 17px 0 rgba(29, 35, 43, .18), 0 34px 0 rgba(29, 35, 43, .12);
      background: rgba(29, 35, 43, .28);
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin: 4px 0 20px;
    }

    .tool-button,
    .mode-button,
    .option-button,
    .text-button {
      min-height: 42px;
      border-radius: 8px;
      padding: 10px 14px;
      transition: transform .15s ease, background .15s ease, border-color .15s ease;
    }

    .mode-button,
    .tool-button,
    .text-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .74);
      color: var(--ink);
    }

    .mode-button.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .tool-button:hover,
    .mode-button:hover,
    .text-button:hover,
    .option-button:hover {
      transform: translateY(-1px);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 18px;
      align-items: start;
    }

    .quiz-panel,
    .side-panel {
      background: rgba(255, 255, 255, .88);
      border: 1px solid rgba(216, 222, 232, .9);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .quiz-panel {
      min-height: 560px;
      padding: 22px;
    }

    .side-panel {
      padding: 18px;
    }

    .question-meta {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 16px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--soft);
      color: #285944;
      font-size: 13px;
      white-space: nowrap;
    }

    .progress-track {
      height: 8px;
      background: #e6e9ef;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 22px;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--blue));
      transition: width .2s ease;
    }

    .question {
      margin: 0 0 18px;
      font-size: clamp(21px, 2.6vw, 30px);
      line-height: 1.45;
      letter-spacing: 0;
    }

    .options {
      display: grid;
      gap: 12px;
      margin: 18px 0;
    }

    .option-button {
      width: 100%;
      display: grid;
      grid-template-columns: 36px 1fr;
      gap: 10px;
      align-items: center;
      text-align: left;
      color: var(--ink);
      background: #fbfcff;
      border: 1px solid var(--line);
      line-height: 1.55;
    }

    .option-letter {
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      color: var(--blue);
      background: #e8eef7;
      font-weight: 700;
      flex: 0 0 auto;
    }

    .option-button.correct {
      border-color: rgba(47, 125, 88, .58);
      background: #edf7f1;
    }

    .option-button.correct .option-letter {
      background: var(--green);
      color: white;
    }

    .option-button.wrong {
      border-color: rgba(179, 58, 58, .58);
      background: #fff0f0;
    }

    .option-button.wrong .option-letter {
      background: var(--accent);
      color: white;
    }

    .option-button:disabled {
      cursor: default;
      transform: none;
    }

    .feedback {
      display: none;
      margin-top: 18px;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fffaf0;
      line-height: 1.7;
    }

    .feedback.show {
      display: block;
    }

    .feedback strong {
      color: var(--accent-dark);
    }

    .memory-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcff;
      padding: 18px;
      line-height: 1.75;
    }

    .memory-label {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 9px;
      border-radius: 999px;
      background: #e8eef7;
      color: var(--blue);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .memory-prompt {
      font-size: 20px;
      color: var(--ink);
    }

    .memory-hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .memory-answer {
      display: grid;
      gap: 10px;
    }

    .memory-answer b {
      color: var(--accent-dark);
    }

    .memory-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .memory-actions .text-button {
      min-height: 38px;
      padding: 8px 12px;
    }

    .option-analysis {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .source-point {
      margin: 12px 0;
      padding: 13px 14px;
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      background: #fff7ed;
      line-height: 1.7;
    }

    .source-point b {
      display: block;
      color: var(--accent-dark);
      margin-bottom: 4px;
    }

    .option-note {
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .72);
      font-size: 14px;
      line-height: 1.65;
    }

    .option-note.correct-note {
      border-color: rgba(47, 125, 88, .42);
      background: #f0f8f3;
    }

    .quiz-actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .primary:hover {
      background: var(--accent-dark);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 10px;
    }

    .stat b {
      display: block;
      font-size: 22px;
      line-height: 1;
      margin-bottom: 7px;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .side-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin: 0 0 12px;
      font-size: 18px;
    }

    .search {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 11px;
      color: var(--ink);
      background: #fff;
      margin-bottom: 12px;
    }

    .point-list {
      display: grid;
      gap: 10px;
      max-height: 460px;
      overflow: auto;
      padding-right: 2px;
    }

    .point-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
    }

    .point-item button {
      width: 100%;
      text-align: left;
      padding: 0;
      background: transparent;
      color: var(--ink);
      line-height: 1.55;
    }

    .point-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .danger {
      color: var(--accent-dark);
    }

    .success {
      color: var(--green);
    }

    .empty {
      color: var(--muted);
      line-height: 1.7;
      padding: 12px 0;
    }

    .icon {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @media (max-width: 900px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .mini-visual {
        display: none;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .quiz-panel {
        order: 1;
      }

      .side-panel {
        order: 2;
      }
    }

    @media (max-width: 560px) {
      .app {
        width: min(100% - 20px, 1180px);
        padding-top: 12px;
      }

      .quiz-panel,
      .side-panel {
        padding: 14px;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr;
      }

      .mode-button,
      .tool-button,
      .text-button {
        justify-content: center;
      }

      .option-button {
        grid-template-columns: 32px 1fr;
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>马原真题式刷题与速记</h1>
        <p class="subtitle">围绕 26 个核心考点训练。选择题优先采用同模块强干扰项，速记卡片用于主动回忆；常错知识点会放在题目后面，方便复盘。</p>
      </div>
      <div class="mini-visual" aria-hidden="true"></div>
    </header>

    <section class="controls" aria-label="练习模式">
      <button id="randomMode" class="mode-button active" type="button">
        <svg class="icon" viewBox="0 0 24 24"><path d="M16 3h5v5"></path><path d="M4 20 21 3"></path><path d="M21 16v5h-5"></path><path d="M15 15l6 6"></path><path d="M4 4l5 5"></path></svg>
        随机练习
      </button>
      <button id="orderMode" class="mode-button" type="button">
        <svg class="icon" viewBox="0 0 24 24"><path d="M8 6h13"></path><path d="M8 12h13"></path><path d="M8 18h13"></path><path d="M3 6h.01"></path><path d="M3 12h.01"></path><path d="M3 18h.01"></path></svg>
        顺序练习
      </button>
      <button id="wrongMode" class="mode-button" type="button">
        <svg class="icon" viewBox="0 0 24 24"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><path d="M12 9v4"></path><path d="M12 17h.01"></path></svg>
        错题强化
      </button>
      <button id="cardMode" class="mode-button" type="button">
        <svg class="icon" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M4 4v15.5"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
        速记卡片
      </button>
      <button id="resetStats" class="tool-button" type="button">
        <svg class="icon" viewBox="0 0 24 24"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path></svg>
        清空记录
      </button>
    </section>

    <section class="layout">
      <article class="quiz-panel" aria-live="polite">
        <div class="question-meta">
          <span id="counter">第 1 / 25 题</span>
          <span id="tag" class="tag">马克思主义总论</span>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <h2 id="questionText" class="question"></h2>
        <div id="options" class="options"></div>
        <div id="feedback" class="feedback"></div>
        <div class="quiz-actions">
          <button id="nextQuestion" class="text-button primary" type="button">
            <svg class="icon" viewBox="0 0 24 24"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
            下一题
          </button>
          <button id="showAnswer" class="text-button" type="button">
            <svg class="icon" viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            查看答案
          </button>
        </div>
      </article>

      <aside class="side-panel">
        <div class="stats-grid">
          <div class="stat"><b id="doneCount">0</b><span>已答题</span></div>
          <div class="stat"><b id="accuracy">0%</b><span>正确率</span></div>
          <div class="stat"><b id="wrongCount">0</b><span>错题数</span></div>
        </div>

        <h3 class="side-title">常错知识点</h3>
        <input id="searchInput" class="search" type="search" placeholder="搜索考点或关键词">
        <div id="pointList" class="point-list"></div>
      </aside>
    </section>
  </main>

  <script>
    const questions = [
      {
        id: "q01",
        category: "马克思主义总论",
        point: "唯物史观和剩余价值学说是马克思一生的两个伟大发现。",
        question: "马克思一生的两个伟大发现是下列哪一组？",
        options: ["唯物史观和剩余价值学说", "辩证法和形而上学批判", "劳动价值论和国家学说", "实践观和人民史观"],
        answer: 0,
        explanation: "大纲指出，马克思通过政治经济学研究系统阐述剩余价值学说；唯物史观和剩余价值学说是他的两个伟大发现。"
      },
      {
        id: "q02",
        category: "马克思主义总论",
        point: "人民性是马克思主义的本质属性，人民至上是马克思主义的政治立场。",
        question: "关于马克思主义的人民性，下列说法正确的是？",
        options: ["人民性是本质属性，人民至上是政治立场", "阶级性是本质属性，技术至上是政治立场", "实践性是本质属性，国家至上是政治立场", "科学性是唯一属性，不涉及政治立场"],
        answer: 0,
        explanation: "马克思主义植根人民之中，是来自人民、为了人民、造福人民的理论。"
      },
      {
        id: "q03",
        category: "唯物论",
        point: "哲学的物质概念与自然科学的物质概念之间是共性与个性的关系。",
        question: "哲学的物质概念与自然科学的物质概念之间的关系是？",
        options: ["共性与个性的关系", "原因与结果的关系", "本质与现象完全等同的关系", "整体与部分完全割裂的关系"],
        answer: 0,
        explanation: "哲学物质概念概括的是一切客观实在的共性，自然科学中的物质形态体现具体个性。"
      },
      {
        id: "q04",
        category: "辩证法",
        point: "否定之否定规律揭示了事物发展的前进性与曲折性的统一。",
        question: "否定之否定规律主要揭示了事物发展的什么特征？",
        options: ["前进性与曲折性的统一", "静止性与绝对性的统一", "偶然性对必然性的取消", "形式对内容的完全决定"],
        answer: 0,
        explanation: "否定之否定规律说明发展不是直线式的，而是在曲折中前进。"
      },
      {
        id: "q05",
        category: "辩证法",
        point: "任何事物都是内容与形式的统一；内容是基础，形式对内容有反作用。",
        question: "关于内容与形式的关系，下列说法正确的是？",
        options: ["内容是事物存在的基础，形式对内容具有反作用", "形式是唯一基础，内容没有独立意义", "内容和形式互不相关", "形式只能消极适应内容，不能产生反作用"],
        answer: 0,
        explanation: "大纲强调任何事物都是内容与形式的统一，既要看到内容的基础地位，也要看到形式的反作用。"
      },
      {
        id: "q06",
        category: "思维方法",
        point: "创新思维能力是对常规思维的突破。",
        question: "创新思维能力的核心含义是？",
        options: ["突破常规思维，因时制宜、开拓创新", "固守既有经验，避免改变", "排斥实践检验，只重主观想象", "用单一标准处理所有问题"],
        answer: 0,
        explanation: "创新思维要求破除迷信、超越陈规，善于知难而进和开拓创新。"
      },
      {
        id: "q07",
        category: "实践观",
        point: "马克思在《关于费尔巴哈的提纲》中系统论述实践观点，创立科学实践观。",
        question: "马克思在哪一文本中系统论述实践观点，揭示科学实践观的基本内容？",
        options: ["《关于费尔巴哈的提纲》", "《资本论》第一卷", "《论欧洲联邦口号》", "《共产党宣言》序言"],
        answer: 0,
        explanation: "大纲称《关于费尔巴哈的提纲》是包含新世界观天才萌芽的第一个文件，其中系统论述了实践观点。"
      },
      {
        id: "q08",
        category: "实践观",
        point: "物质资料的生产是人类历史中首要的社会实践活动。",
        question: "马克思、恩格斯认为，人类历史中首要的社会实践活动是？",
        options: ["物质资料的生产", "纯粹理论沉思", "宗教仪式活动", "审美娱乐活动"],
        answer: 0,
        explanation: "物质资料生产是其他一切历史活动得以进行的前提。"
      },
      {
        id: "q09",
        category: "认识论",
        point: "实践是认识的来源、动力、目的，并且是检验认识真理性的唯一标准。",
        question: "下列哪一项不是实践对认识决定作用的表现？",
        options: ["实践是认识的任意装饰", "实践是认识的来源", "实践是认识发展的动力", "实践是检验认识真理性的唯一标准"],
        answer: 0,
        explanation: "实践对认识的决定作用包括来源、动力、目的和检验真理性的唯一标准。"
      },
      {

        return;
      }

      if (currentIndex >= queue.length) {
        if (mode === "random") queue = shuffle(queue);
        currentIndex = 0;
      }

      currentQuestion = queue[currentIndex];
      currentView = buildQuestionView(currentQuestion);
      el.counter.textContent = `第 ${currentIndex + 1} / ${queue.length} 题`;
      el.tag.textContent = currentQuestion.category;
      el.progressBar.style.width = `${((currentIndex + 1) / queue.length) * 100}%`;
      el.questionText.textContent = currentView.question;
      el.showAnswer.disabled = false;
      el.next.disabled = false;

      el.options.innerHTML = currentView.options.map((option, index) => `
        <button class="option-button" type="button" data-index="${index}">
          <span class="option-letter">${letters[index]}</span>
          <span>${option}</span>
        </button>
      `).join("");

      [...el.options.querySelectorAll("button")].forEach(button => {
        button.addEventListener("click", () => choose(Number(button.dataset.index)));
      });
    }

    function buildQuestionView(question) {
      const textOnlyForms = [question.question, ...(variantBank[question.id] || [])].map(prompt => ({
        question: prompt,
        options: question.options,
        answer: question.answer,
        explanation: question.explanation
      }));
      const fallbackForms = [...textOnlyForms, ...(formBank[question.id] || [])];
      const strictForms = [
        ...(strictExamBank[question.id] || []),
        ...(strictSupplementBank[question.id] || [])
      ];
      const forms = strictForms.length ? strictForms : fallbackForms;
      const form = forms[Math.floor(Math.random() * forms.length)];
      const options = form.options.map((text, index) => ({
        text,
        originalIndex: index,
        note: (form.optionNotes && form.optionNotes[index]) || buildOptionNote(text, index, form, question)
      }));
      const shuffled = shuffle(options);
      return {
        question: form.question,
        options: shuffled.map(option => option.text),
        optionNotes: shuffled.map(option => option.note),
        answer: shuffled.findIndex(option => option.originalIndex === form.answer),
        explanation: form.explanation || question.explanation
      };
    }

    function buildOptionNote(text, index, form, question) {
      if (index === form.answer) {
        return "正确。该项准确扣住题干中的关键词和教材原理。";
      }
      const rules = [
        ["个人联合", "陷阱：个人联合是金融寡头控制国家机器的政治方式，不是经济领域统治方式。"],
        ["参与制", "陷阱：参与制主要用于说明金融寡头在经济领域的统治，若题干问政治控制就属于张冠李戴。"],
        ["个别劳动时间", "陷阱：个别劳动时间影响个别生产者盈亏，但不决定商品价值量。"],
        ["社会必要劳动时间", "陷阱：社会必要劳动时间决定价值量；若题干考个别企业效率或盈亏，要注意不要误用。"],
        ["使用价值", "陷阱：使用价值说明商品能满足需要，但不决定商品交换比例。"],
        ["劳动生产率", "陷阱：劳动生产率与单位商品价值量成反比，不能直接说它决定交换比例。"],
        ["按需分配", "陷阱：按需分配属于共产主义高级阶段，不能提前到第一阶段。"],
        ["按劳分配", "陷阱：按劳分配对应共产主义第一阶段，不是高级阶段的最终分配方式。"],
        ["经验主义", "陷阱：经验主义是片面夸大感性经验；若题干强调照搬书本结论，应辨为教条主义。"],
        ["教条主义", "陷阱：教条主义是片面夸大理性认识；若题干强调只凭零散经验，应辨为经验主义。"],
        ["先验论", "陷阱：先验论把认识来源归于先天观念，和唯物主义反映论相对立。"],
        ["反映论", "陷阱：反映论强调主体对客体的反映；若题干否认客观对象，就不能选它。"],
        ["社会意识", "陷阱：社会意识有相对独立性和反作用，但归根到底由社会存在决定。"],
        ["社会存在", "陷阱：唯物史观强调社会存在决定社会意识，不能倒置为观念决定历史。"],
        ["质量互变", "陷阱：质量互变规律侧重量变和质变，若题干强调曲折中前进，应选否定之否定。"],
        ["否定之否定", "陷阱：否定之否定强调前进性和曲折性统一，不是简单重复或量变积累。"],
        ["物质资料", "陷阱：物质资料生产是首要社会实践；若题干问认识检验标准，则应回到实践。"],
        ["剩余价值", "陷阱：剩余价值揭示资本主义剥削关系；若题干问商品交换比例，要回到价值。"],
        ["价值规律", "陷阱：价值规律调节市场资源配置，但不能消灭商品经济矛盾。"],
        ["国家垄断资本主义", "陷阱：国家垄断资本主义仍是资本主义，不是消灭私人垄断资本后的社会主义。"]
      ];
      const hit = rules.find(([keyword]) => text.includes(keyword));
      if (hit) return hit[1];
      return "陷阱：该项看似属于马原术语，但与题干限定的关键词、关系或阶段不一致。";
    }

    function choose(index, revealOnly = false) {
      if (!currentQuestion || !currentView || answered) return;
      answered = true;
      const isCorrect = index === currentView.answer;

      if (!revealOnly) {
        const record = stats[currentQuestion.id] || { attempts: 0, correct: 0, wrong: 0 };
        record.attempts += 1;
        if (isCorrect) {
          record.correct += 1;
          record.last = "correct";
        } else {
          record.wrong += 1;
          record.last = "wrong";
          record.lastWrongAt = new Date().toISOString();
        }
        stats[currentQuestion.id] = record;
        saveStats();
      }

      [...el.options.querySelectorAll("button")].forEach(button => {
        const buttonIndex = Number(button.dataset.index);
        button.disabled = true;
        if (buttonIndex === currentView.answer) button.classList.add("correct");
        if (!revealOnly && buttonIndex === index && !isCorrect) button.classList.add("wrong");
      });

      const status = revealOnly ? "答案" : (isCorrect ? "答对了" : "答错了");
      const correctText = currentView.options[currentView.answer];
      el.feedback.className = "feedback show";
      el.feedback.innerHTML = `
        <strong>${status}：${letters[currentView.answer]}. ${correctText}</strong>
        <div class="source-point">
          <b>对应知识点原句</b>
          <div>${currentQuestion.point}</div>
        </div>
        <div><b>解析：</b>${currentView.explanation}</div>
        <div class="option-analysis">
          ${currentView.optionNotes.map((note, noteIndex) => `
            <div class="option-note ${noteIndex === currentView.answer ? "correct-note" : ""}">
              <b>${letters[noteIndex]}项：</b>${note}
            </div>
          `).join("")}
        </div>
      `;
      renderStats();
    }

    function renderCard() {
      answered = false;
      currentQuestion = null;
      currentView = null;
      el.feedback.className = "feedback";
      el.feedback.innerHTML = "";

      if (!cardQueue.length) cardQueue = buildCardQueue();
      if (cardIndex >= cardQueue.length) {
        cardQueue = buildCardQueue();
        cardIndex = 0;
      }

      currentCard = cardQueue[cardIndex];
      el.counter.textContent = `卡片 ${cardIndex + 1} / ${cardQueue.length}`;
      el.tag.textContent = currentCard.category;
      el.progressBar.style.width = `${((cardIndex + 1) / cardQueue.length) * 100}%`;
      el.questionText.textContent = "先回忆，再看答案";
      el.options.innerHTML = `
        <div class="memory-card">
          <div class="memory-label">高频速记</div>
          <div class="memory-prompt">${currentCard.prompt}</div>
          <div class="memory-hint">先在脑子里说出关键词，再点“显示答案”。不要急着看。</div>
        </div>
      `;
      el.showAnswer.disabled = false;
      el.next.disabled = false;
    }

    function revealCard() {
      if (!currentCard || answered) return;
      answered = true;
      el.feedback.className = "feedback show";
      el.feedback.innerHTML = `
        <div class="memory-answer">
          <div><b>答案：</b>${currentCard.answer}</div>
          <div><b>易混陷阱：</b>${currentCard.trap}</div>
          <div><b>对应知识点：</b>${currentCard.source}</div>
        </div>
        <div class="memory-actions">
          <button class="text-button primary" type="button" data-memory-rate="mastered">已掌握</button>
          <button class="text-button" type="button" data-memory-rate="fuzzy">还模糊</button>
          <button class="text-button" type="button" data-memory-rate="unknown">不会</button>
          <button class="text-button" type="button" data-practice-point="${currentCard.id}">用选择题考我</button>
        </div>
      `;
      [...el.feedback.querySelectorAll("[data-memory-rate]")].forEach(button => {
        button.addEventListener("click", () => rateCard(button.dataset.memoryRate));
      });
      const practice = el.feedback.querySelector("[data-practice-point]");
      practice.addEventListener("click", () => jumpToQuestion(practice.dataset.practicePoint));
    }

    function rateCard(level) {
      if (!currentCard) return;
      const record = stats[currentCard.id] || { attempts: 0, correct: 0, wrong: 0 };
      record.memory = record.memory || { mastered: 0, fuzzy: 0, unknown: 0 };
      record.memory[level] = (record.memory[level] || 0) + 1;
      if (level === "unknown") record.wrong = (record.wrong || 0) + 1;
      stats[currentCard.id] = record;
      saveStats();
      renderStats();
      nextQuestion();
    }

    function nextQuestion() {
      if (mode === "cards") {
        cardIndex += 1;
        renderCard();
        return;
      }
      if (!queue.length) return;
      currentIndex += 1;
      renderQuestion();
    }

    function revealAnswer() {
      if (mode === "cards") {
        revealCard();
        return;
      }
      if (!currentQuestion || answered) return;
      choose(currentView.answer, true);
    }

    function renderStats() {
      const records = Object.values(stats);
      const attempts = records.reduce((sum, item) => sum + (item.attempts || 0), 0);
      const correct = records.reduce((sum, item) => sum + (item.correct || 0), 0);
      const wrongQuestions = questions.filter(q => (stats[q.id]?.wrong || 0) > 0).length;
      el.doneCount.textContent = attempts;
      el.accuracy.textContent = attempts ? `${Math.round((correct / attempts) * 100)}%` : "0%";
      el.wrongCount.textContent = wrongQuestions;
      renderPointList();
    }

    function renderPointList() {
      const keyword = el.searchInput.value.trim().toLowerCase();
      const decorated = questions
        .map(q => ({ ...q, stat: stats[q.id] || { attempts: 0, correct: 0, wrong: 0 } }))
        .filter(q => {
          if (!keyword) return true;
          return `${q.category} ${q.point} ${q.question}`.toLowerCase().includes(keyword);
        })
        .sort((a, b) => {
          const wrongDiff = (b.stat.wrong || 0) - (a.stat.wrong || 0);
          if (wrongDiff) return wrongDiff;
          return (b.stat.attempts || 0) - (a.stat.attempts || 0);
        });

      if (!decorated.length) {
        el.pointList.innerHTML = `<div class="empty">没有匹配的考点。</div>`;
        return;
      }

      el.pointList.innerHTML = decorated.map(q => {
        const attempts = q.stat.attempts || 0;
        const wrong = q.stat.wrong || 0;
        const correct = q.stat.correct || 0;
        const accuracy = attempts ? Math.round((correct / attempts) * 100) : 0;
        const statusClass = wrong ? "danger" : (attempts ? "success" : "");
        const status = wrong ? `错 ${wrong} 次` : (attempts ? "暂未答错" : "未练习");
        return `
          <div class="point-item">
            <button type="button" data-jump="${q.id}">
              <strong>${q.category}</strong><br>${q.point}
            </button>
            <div class="point-row">
              <span class="${statusClass}">${status}</span>
              <span>${attempts ? `正确率 ${accuracy}%` : "点击可练此题"}</span>
            </div>
          </div>
        `;
      }).join("");

      [...el.pointList.querySelectorAll("button[data-jump]")].forEach(button => {
        button.addEventListener("click", () => jumpToQuestion(button.dataset.jump));
      });
    }

    function jumpToQuestion(id) {
      const found = questions.find(q => q.id === id);
      if (!found) return;
      mode = "order";
      queue = [found, ...questions.filter(q => q.id !== id)];
      currentIndex = 0;
      updateModeButtons();
      renderQuestion();
    }

    function resetStats() {
      const ok = window.confirm("确定清空答题记录和常错知识点吗？");
      if (!ok) return;
      stats = {};
      saveStats();
      if (mode === "wrong") queue = buildQueue("wrong");
      renderQuestion();
      renderStats();
    }

    el.randomMode.addEventListener("click", () => setMode("random"));
    el.orderMode.addEventListener("click", () => setMode("order"));
    el.wrongMode.addEventListener("click", () => setMode("wrong"));
    el.cardMode.addEventListener("click", () => setMode("cards"));
    el.resetStats.addEventListener("click", resetStats);
    el.next.addEventListener("click", nextQuestion);
    el.showAnswer.addEventListener("click", revealAnswer);
    el.searchInput.addEventListener("input", renderPointList);

    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }

    queue = buildQueue(mode);
    cardQueue = buildCardQueue();
    renderQuestion();
    renderStats();
  </script>
</body>
</html>
